name: Verify + Publish OTA Update

# 门禁 + 发布：
#   - verify: 每次 PR 与 push 都跑 tsc + Jest（含组件测试）+ Metro 打包冒烟。
#     把书架/阅读/排版等原本靠真机手动检查的项变成自动关卡；同时 expo export
#     能抓「npm test 绿但 RN bundle 崩」的老坑（见 docs / metro.config.js）。
#   - publish-ota: 仅在 push 到 main 且 verify 通过后运行，跑 eas update 发 OTA。
#     已安装的 App 下次冷启动自动拉新 JS bundle，无需原生重建/重签。
#
# 前置（一次性，见 docs/EAS_UPDATE_SETUP.md）：EXPO_TOKEN 存到仓库 Secrets。

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/build-unsigned-ipa.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck (tsc strict)
        run: npx tsc --noEmit

      - name: Unit + component tests
        run: npm test -- --ci

      - name: Metro bundle smoke (iOS export)
        run: npx expo export --platform ios

  publish-ota:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update to production channel
        # Pass the commit message via an env var, not inline ${{ }}, so quotes
        # or newlines in the message can't break the shell argument parsing.
        env:
          UPDATE_MESSAGE: ${{ github.event.head_commit.message || 'manual OTA' }}
        run: eas update --branch production --message "$UPDATE_MESSAGE" --non-interactive
